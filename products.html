<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Prime Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <h1>Prime Cart</h1>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="cart.html">Cart 🛒</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="product-page">

    <div class="product-image-box">
        <img id="productImage" src="" alt="">
    </div>

    <div class="product-details">

        <h1 id="productName"></h1>

        <p class="product-category" id="productCategory"></p>

        <h2 class="big-price" id="productPrice"></h2>

        <p class="product-description" id="productDescription"></p>

        <div class="button-group">
            <button class="gold-button">
                Add to Cart
            </button>

            <button class="buy-button">
                Buy Now
            </button>
        </div>

    </div>

</section>

<a href="https://wa.me/918288090514"
class="whatsapp-button">
    WhatsApp Support
</a>

<script>
const product =
JSON.parse(localStorage.getItem("selectedProduct"));

document.getElementById("productImage").src =
product.image;

document.getElementById("productName").textContent =
product.name;

document.getElementById("productCategory").textContent =
product.category;

document.getElementById("productPrice").textContent =
"₹" + product.price;

document.getElementById("productDescription").textContent =
product.description;
</script>

</body>
</html>
